name: Build & Release Nightly Alias

on:
  push:

jobs:
  build:
    runs-on: docker
    container:
      image: node:24-alpine
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            python3 \
            py3-pip \
            py3-setuptools
      
      - name: check versions
        run: |
          node -v
          npm -v
          python3 --version
          pip3 --version

      - uses: actions/checkout@v4

      - name: Run build script
        run: |
          python3 build.py

      - name: Verify output
        run: ls -R dist

      - name: Create Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.11.3
        with:
          direction: upload
          token: ${{ secrets.WRITE_TOKEN }}
          release-dir: dist
          title: "Nightly release"