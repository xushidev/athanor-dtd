name: Build & Release Nightly Alias

on:
  push:

jobs:
  build:
    runs-on: docker
    container:
      image: node:20
    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            git \
            python3
      
      - name: check versions
        run: |
          node -v
          npm -v
          python3 --version

      - uses: actions/checkout@v4

      - name: Run build script
        run: |
          python3 build.py

      - name: Verify output
        run: ls -R dist

      - name: Create Release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.11.3
        with:
          direction: upload
          token: ${{ secrets.WRITE_TOKEN }}
          release-dir: dist
          tag: nightly-${{ github.run_number }}
          title: "Nightly build #${{ github.run_number }}"