name: Build & Release Nightly Alias

on:
  push:

jobs:
  build:
    runs-on: docker
    container:
      image: ubuntu:22.04
    steps:
      - name: Update ubuntu repositories
        run: |
          apt update

      - name: Install dependencies
        run: |
          apt install \
            nodejs \
            npm \
            git \
            python3 \
            py3-pip \
            py3-setuptools \
            bash

      - uses: actions/checkout@v4

      - name: Run build script
        run: |
          python3 build.py

      - name: Verify output
        run: ls -R dist

      - name: Create Release
        uses: actions/forgejo-release@v2.11.1
        with:
          direction: upload
          token: ${{ secrets.WRITE_TOKEN }}
          release-dir: dist
          title: "Nightly release"