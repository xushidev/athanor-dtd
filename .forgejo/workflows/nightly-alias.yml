name: Build & Release Nightly Alias

on:
  push:

jobs:
  build:
    runs-on: docker
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git

      - name: Setup NodeJs
        uses: actions/setup-node@v3
        with:
          node-version: '24'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Check out repository
        uses: https://code.forgejo.org/actions/checkout@v6

      - name: Run build script
        run: |
          python build.py

      - name: Verify output
        run: ls -R dist

      - name: Create Release
        uses: actions/forgejo-release@v2.11.1
        with:
          direction: upload
          token: ${{ secrets.WRITE_TOKEN }}
          release-dir: dist
          title: "Nightly release"